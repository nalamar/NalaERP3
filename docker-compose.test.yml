services:
  postgres_test:
    image: postgres:17
    environment:
      POSTGRES_USER: nala
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: nalaerp_test
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale-provider=icu --icu-locale=de-x-icu"
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      TZ: Europe/Berlin
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo_test:
    image: mongo:7
    environment:
      TZ: Europe/Berlin
    ports:
      - "57017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis_test:
    image: redis:7
    command: ["redis-server", "--appendonly", "no"]
    environment:
      TZ: Europe/Berlin
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

networks:
  default:
    name: nalaerp_test_net
